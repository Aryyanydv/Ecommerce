<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f1f1f, #121212);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #bbb;
        }

        input {
            width: 94%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #2a2a2a;
            color: #fff;
        }

        input::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2196f3;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1976d2;
        }

        .message {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .success {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
        }

        .footer-text a {
            color: #4caf50;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .failed{
            background:#f8d7da;
            color:#721c24;
        }
        
    </style>
</head>

<body>

    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <small id="emailError" style="color:red;"></small>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <small id="passwordError" style="color:red;"></small>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
