<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart Page</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }
    .cart-container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }
    .item-details {
      flex: 2;
    }
    .item-actions {
      flex: 1;
      text-align: right;
    }
    .total {
      text-align: right;
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
    button {
      padding: 5px 10px;
      margin: 5px;
      cursor: pointer;
    }
    .checkout-btn {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="cart-container">
  <h2>Your Cart</h2>

  <div id="cart-items">
    <!-- Items will come here dynamically -->
  </div>

  <div class="total">
    Total: ₹<span id="total-price">0</span>
  </div>
  <input type="text" id="address" placeholder="Enter address">

  <button class="checkout-btn" onclick="handlePayment()" id="checkout-btn"> 
    Proceed to Checkout
  </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="script.js"></script>

</body>
</html>
